<script id="fragment_shader_screen" type="x-shader/x-fragment">

      varying vec2 vUv;
      uniform sampler2D tDiffuse;

      void main() {

        gl_FragColor = texture2D( tDiffuse, vUv );

        // https://github.com/chribbe/ThreeJS-GameboyStyleShader/blob/master/js/GameboyShader.js
        // MIT License

        vec3 c64col[5];
        c64col[0] = vec3(247.0, 225.0, 143.0); //yeelow
        c64col[1] = vec3(227.0, 159.0, 86.0); // muted orange
        c64col[2] = vec3(58.0, 130.0, 201.0); // blue
        c64col[3] = vec3(140.0, 78.0, 58.0); // brugundy?
        c64col[4] = vec3(39.0, 73.0, 89.0); //deep turq

        vec3 samp = texture2D(tDiffuse, vUv.xy).rgb;
        vec3 match = vec3(0.0,0.0,0.0);
        float best_dot = 8.0;

        for (int c=4; c>=0; c--) {
          float this_dot = distance(c64col[c]/255.0,samp);
          if (this_dot<best_dot) {
            best_dot = this_dot;
            match = c64col[c];
          }
        }

        vec4 color = vec4(match/255.0,0.0);

        gl_FragColor = color;

      }

</script>

<script id="vertexShader" type="x-shader/x-vertex">

      varying vec2 vUv;

      void main() {

        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );

        gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );

      }

</script>
